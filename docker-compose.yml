version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_S3_THEMES_BASE_URL=${VITE_S3_THEMES_BASE_URL:-https://s3.timeweb.cloud/my-temp-bucket/themes/}
    ports:
      - "8000:8000"
    environment:
      # Provide your actual key or use .env file
      - GAMMA_API_KEY=${GAMMA_API_KEY:-sk-gamma-placeholder}
      - MOCK_MODE=${MOCK_MODE:-false}
